services:
  postgres:
    image: postgres:17

    container_name: tekken-postgres

    environment:
      POSTGRES_DB: tekken
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4904

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  postgres-data: